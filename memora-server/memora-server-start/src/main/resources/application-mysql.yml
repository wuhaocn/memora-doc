# MySQL 配置示例
# 使用方法：在 application.yml 中设置 spring.profiles.active=mysql，
# 并通过环境变量提供数据库连接信息，不要在仓库内提交真实口令。

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MEMORA_DB_URL:jdbc:mysql://localhost:3306/memora_doc?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${MEMORA_DB_USERNAME:memora}
    password: ${MEMORA_DB_PASSWORD:change-me}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-mysql.sql
      data-locations: classpath:db/data.sql
